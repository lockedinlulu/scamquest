<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScamQuest OS</title>

  <link rel="stylesheet" href="style.css" />
<script type="module" src="./js/main.js"></script></head>

<body>

<!-- 🍎 TOP BAR -->
<div class="top-bar">

  <div class="left">
    <span class="apple-logo">🍎</span>
    <span class="os-title">ScamQuest OS</span>
  </div>

  <div class="right">
    <span>📶</span>
    <span>🔋 87%</span>
    <span id="time">--:--</span>
  </div>

</div>

<!-- 🖥️ DESKTOP ICONS (FILES / FOLDERS BACKGROUND) -->
<div class="desktop">

  <!-- fake “school/work folders” -->
  <div class="folder">📁 School Work</div>
  <div class="folder">📁 Taxes 2025</div>
  <div class="folder">📁 Internship Docs</div>
  <div class="folder">📁 Random PDFs</div>
  <div class="folder">📁 Passwords (DO NOT OPEN)</div>

</div>

<!-- 📱 DOCK -->
<div class="dock">

  <div class="dock-item">🧭<span>Safari</span></div>
  <div class="dock-item">🌐<span>Chrome</span></div>
  <div class="dock-item">📁<span>Files</span></div>
  <div class="dock-item">🗑️<span>Recycle</span></div>
  <div class="dock-item">💬<span>Messages</span></div>
  <div class="dock-item">📧<span>Email</span></div>
  <div class="dock-item">📷<span>Photos</span></div>
  <div class="dock-item">🎥<span>FaceTime</span></div>

</div>

</body>
</html>
